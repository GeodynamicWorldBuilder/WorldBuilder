name: post benchmark results in pull request

on:
  workflow_run:
    workflows: ["benchmarks"]
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  prepare:
    name: Download and unzip artifacts
    runs-on: ubuntu-latest
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success'
      }}
    outputs:
      pull_request_number: ${{ steps.retrieve_pr.outputs.pull_request_number }}
    steps:
      - name: Download artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const runId = context.payload.workflow_run?.id;
            if (!runId) {
              core.setFailed('workflow_run.id is missing in event payload.');
              return;
            }

            const { data } = await octokit.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });

            const names = Array.from({ length: 8 }, (_, i) => `benchmark_${i + 1}_results`);

            for (const name of names) {
              const artifact = data.artifacts.find(a => a.name === name);
              if (!artifact) {
                core.warning(`Artifact not found: ${name}`);
                continue;
              }

              const download = await octokit.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: 'zip',
              });

              const filePath = path.join(process.env.GITHUB_WORKSPACE, `${name}.zip`);
              fs.writeFileSync(filePath, Buffer.from(download.data));
              core.info(`Saved ${filePath}`);
            }

      - name: Unzip artifacts
        run: |
          set -e
          for i in $(seq 1 8); do
            f="benchmark_${i}_results.zip"
            if [ -f "$f" ]; then
              unzip -o "$f"
            else
              echo "Missing $f (skipping)"
            fi
          done

      - name: Retrieve pull request number
        id: retrieve_pr
        run: |
          set -e
          cat "${{ github.workspace }}/NR"
          echo "pull_request_number=$(cat "${{ github.workspace }}/NR")" >> "$GITHUB_OUTPUT"

  parse:
    name: Parse benchmark ${{ matrix.benchmark }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        benchmark: [1, 2, 3, 4, 5, 6, 7, 8]
    outputs:
      wall_time_main_mean_${{ matrix.benchmark }}: ${{ steps.parse.outputs.wall_time_main_mean }}
      wall_time_main_std_dev_${{ matrix.benchmark }}: ${{ steps.parse.outputs.wall_time_main_std_dev }}
      wall_time_main_samples_${{ matrix.benchmark }}: ${{ steps.parse.outputs.wall_time_main_samples }}
      wall_time_feature_mean_${{ matrix.benchmark }}: ${{ steps.parse.outputs.wall_time_feature_mean }}
      wall_time_feature_std_dev_${{ matrix.benchmark }}: ${{ steps.parse.outputs.wall_time_feature_std_dev }}
      wall_time_feature_samples_${{ matrix.benchmark }}: ${{ steps.parse.outputs.wall_time_feature_samples }}
      wall_time_CI_low_${{ matrix.benchmark }}: ${{ steps.parse.outputs.wall_time_CI_low }}
      wall_time_CI_high_${{ matrix.benchmark }}: ${{ steps.parse.outputs.wall_time_CI_high }}
    steps:
      - name: Download artifacts from prepare job
        uses: actions/download-artifact@v4
        with:
          name: placeholder
        continue-on-error: true

      - name: Pull analyze logs (from prepare via artifact)
        shell: bash
        run: |
          echo "This job needs the analyze logs. Upload them in 'prepare' and download here."
        continue-on-error: true

      - name: Parse benchmark
        id: parse
        shell: bash
        run: |
          set -e

          # Acquire the analyze logs produced in 'prepare' job by downloading an aggregated artifact.
          # If your 'benchmarks' workflow already produced analyze_${n}.log inside each artifact zip,
          # the 'prepare' job unzip step has extracted them. We'll package them there and fetch here.
          #
          # However, to simplify and avoid a second transfer, we can instead move the parsing into the 'prepare'
          # job using a loop and set outputs via GITHUB_OUTPUT per benchmark. But you asked for a matrix,
          # so we'll do a small workaround: re-download the original artifacts and unzip here too.

          # Re-download the specific benchmark artifact expected for this matrix entry:
          # We'll use gh api (preinstalled) to download. Alternatively, we could repeat the github-script call here.
          # To keep it simple and reliable, let's parse the logs directly inside this step by pulling the same artifact names.
          # Note: Requires 'actions: read' permission, already granted.

          i=${{ matrix.benchmark }}

          # Use the event payload to get run id via the environment (cannot in shell).
          # We'll call a tiny node script to fetch and unzip the right artifact.
          node -e '
            const fs = require("fs");
            const path = require("path");

            const core = require("@actions/core");
            const github = require("@actions/github");

            const token = process.env.GITHUB_TOKEN;
            if (!token) {
              console.error("GITHUB_TOKEN missing");
              process.exit(1);
            }

            const { Octokit } = require("@octokit/rest");
            const octokit = new Octokit({ auth: token });

            const payload = JSON.parse(process.env.GITHUB_EVENT_PAYLOAD || "{}");
            const runId = payload.workflow_run && payload.workflow_run.id;
            if (!runId) {
              console.error("workflow_run.id not found in payload");
              process.exit(1);
            }

            (async () => {
              const owner = process.env.GITHUB_REPOSITORY.split("/")[0];
              const repo = process.env.GITHUB_REPOSITORY.split("/")[1];

              const { data } = await octokit.rest.actions.listWorkflowRunArtifacts({
                owner, repo, run_id: runId, per_page: 100,
              });

              const name = `benchmark_${process.env.BENCH}_results`;
              const artifact = data.artifacts.find(a => a.name === name);
              if (!artifact) {
                console.warn(`Artifact not found: ${name}`);
                process.exit(0);
              }

              const download = await octokit.rest.actions.downloadArtifact({
                owner, repo, artifact_id: artifact.id, archive_format: "zip",
              });

              const filePath = path.join(process.env.GITHUB_WORKSPACE, `${name}.zip`);
              fs.writeFileSync(filePath, Buffer.from(download.data));
              console.log(`Saved ${filePath}`);
            })().catch(err => { console.error(err); process.exit(1); });
          ' \
          && unzip -o "benchmark_${i}_results.zip" || echo "Benchmark ${i} artifact missing or unzip failed (continuing)"

          file="analyze_${i}.log"
          if [ ! -f "$file" ]; then
            echo "analyze_${i}.log not found; producing empty outputs to avoid failure."
            {
              echo "wall_time_main_mean="
              echo "wall_time_main_std_dev="
              echo "wall_time_main_samples="
              echo "wall_time_feature_mean="
              echo "wall_time_feature_std_dev="
              echo "wall_time_feature_samples="
              echo "wall_time_CI_low="
              echo "wall_time_CI_high="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat "$file"
          line=$(grep wall_time "$file" | sed "s/\x1B\[[0-9;]\{1,\}[A-Za-z]//g")
          samples=$(grep samples "$file" | sed "s/\x1B\[[0-9;]\{1,\}[A-Za-z]//g")
          {
            echo "wall_time_main_mean=$(echo "$line" | awk "{print \$2}")"
            echo "wall_time_main_std_dev=$(echo "$line" | awk "{print \$4}")"
            echo "wall_time_main_samples=$(echo "$samples" | awk "{print \$2}")"
            echo "wall_time_feature_mean=$(echo "$line" | awk "{print \$5}")"
            echo "wall_time_feature_std_dev=$(echo "$line" | awk "{print \$7}")"
            echo "wall_time_feature_samples=$(echo "$samples" | awk "{print \$3}")"
            echo "wall_time_CI_low=$(echo "$line" | sed "s/\[/ /g; s/\]/ /g" | awk "{print \$8}")"
            echo "wall_time_CI_high=$(echo "$line" | sed "s/\[/ /g; s/\]/ /g" | awk "{print \$10}")"
          } >> "$GITHUB_OUTPUT"
        env:
          BENCH: ${{ matrix.benchmark }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provide the event payload for Node snippet
          GITHUB_EVENT_PAYLOAD: ${{ toJson(github.event) }}

  comment:
    name: Create or update PR comment
    runs-on: ubuntu-latest
    needs: [prepare, parse]
    if: always() && needs.prepare.result == 'success'
    steps:
      - name: Find Comment
        id: find_comment
        continue-on-error: true
        uses: peter-evans/find-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ needs.prepare.outputs.pull_request_number }}
          comment-author: 'github-actions[bot]'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ needs.prepare.outputs.pull_request_number }}
          body: |
            | Benchmark | Main | Feature | Difference (99.9% CI) |
            | --- | --- | --- | --- |
            | Slab interpolation simple none | ${{ needs.parse.outputs.wall_time_main_mean_1 }} ± ${{ needs.parse.outputs.wall_time_main_std_dev_1 }} (s=${{ needs.parse.outputs.wall_time_main_samples_1 }}) | ${{ needs.parse.outputs.wall_time_feature_mean_1 }} ± ${{ needs.parse.outputs.wall_time_feature_std_dev_1 }} (s=${{ needs.parse.outputs.wall_time_feature_samples_1 }}) | ${{ needs.parse.outputs.wall_time_CI_low_1 }} .. ${{ needs.parse.outputs.wall_time_CI_high_1 }} |
            | Slab interpolation curved simple none | ${{ needs.parse.outputs.wall_time_main_mean_2 }} ± ${{ needs.parse.outputs.wall_time_main_std_dev_2 }} (s=${{ needs.parse.outputs.wall_time_main_samples_2 }}) | ${{ needs.parse.outputs.wall_time_feature_mean_2 }} ± ${{ needs.parse.outputs.wall_time_feature_std_dev_2 }} (s=${{ needs.parse.outputs.wall_time_feature_samples_2 }}) | ${{ needs.parse.outputs.wall_time_CI_low_2 }} .. ${{ needs.parse.outputs.wall_time_CI_high_2 }} |
            | Spherical slab interpolation simple none | ${{ needs.parse.outputs.wall_time_main_mean_3 }} ± ${{ needs.parse.outputs.wall_time_main_std_dev_3 }} (s=${{ needs.parse.outputs.wall_time_main_samples_3 }}) | ${{ needs.parse.outputs.wall_time_feature_mean_3 }} ± ${{ needs.parse.outputs.wall_time_feature_std_dev_3 }} (s=${{ needs.parse.outputs.wall_time_feature_samples_3 }}) | ${{ needs.parse.outputs.wall_time_CI_low_3 }} .. ${{ needs.parse.outputs.wall_time_CI_high_3 }} |
            | Slab interpolation simple curved CMS | ${{ needs.parse.outputs.wall_time_main_mean_4 }} ± ${{ needs.parse.outputs.wall_time_main_std_dev_4 }} (s=${{ needs.parse.outputs.wall_time_main_samples_4 }}) | ${{ needs.parse.outputs.wall_time_feature_mean_4 }} ± ${{ needs.parse.outputs.wall_time_feature_std_dev_4 }} (s=${{ needs.parse.outputs.wall_time_feature_samples_4 }}) | ${{ needs.parse.outputs.wall_time_CI_low_4 }} .. ${{ needs.parse.outputs.wall_time_CI_high_4 }} |
            | Spherical slab interpolation simple CMS | ${{ needs.parse.outputs.wall_time_main_mean_5 }} ± ${{ needs.parse.outputs.wall_time_main_std_dev_5 }} (s=${{ needs.parse.outputs.wall_time_main_samples_5 }}) | ${{ needs.parse.outputs.wall_time_feature_mean_5 }} ± ${{ needs.parse.outputs.wall_time_feature_std_dev_5 }} (s=${{ needs.parse.outputs.wall_time_feature_samples_5 }}) | ${{ needs.parse.outputs.wall_time_CI_low_5 }} .. ${{ needs.parse.outputs.wall_time_CI_high_5 }} |
            | Spherical fault interpolation simple none | ${{ needs.parse.outputs.wall_time_main_mean_6 }} ± ${{ needs.parse.outputs.wall_time_main_std_dev_6 }} (s=${{ needs.parse.outputs.wall_time_main_samples_6 }}) | ${{ needs.parse.outputs.wall_time_feature_mean_6 }} ± ${{ needs.parse.outputs.wall_time_feature_std_dev_6 }} (s=${{ needs.parse.outputs.wall_time_feature_samples_6 }}) | ${{ needs.parse.outputs.wall_time_CI_low_6 }} .. ${{ needs.parse.outputs.wall_time_CI_high_6 }} |
            | Cartesian min max surface | ${{ needs.parse.outputs.wall_time_main_mean_7 }} ± ${{ needs.parse.outputs.wall_time_main_std_dev_7 }} (s=${{ needs.parse.outputs.wall_time_main_samples_7 }}) | ${{ needs.parse.outputs.wall_time_feature_mean_7 }} ± ${{ needs.parse.outputs.wall_time_feature_std_dev_7 }} (s=${{ needs.parse.outputs.wall_time_feature_samples_7 }}) | ${{ needs.parse.outputs.wall_time_CI_low_7 }} .. ${{ needs.parse.outputs.wall_time_CI_high_7 }} |
            | Spherical min max surface | ${{ needs.parse.outputs.wall_time_main_mean_8 }} ± ${{ needs.parse.outputs.wall_time_main_std_dev_8 }} (s=${{ needs.parse.outputs.wall_time_main_samples_8 }}) | ${{ needs.parse.outputs.wall_time_feature_mean_8 }} ± ${{ needs.parse.outputs.wall_time_feature_std_dev_8 }} (s=${{ needs.parse.outputs.wall_time_feature_samples_8 }}) | ${{ needs.parse.outputs.wall_time_CI_low_8 }} .. ${{ needs.parse.outputs.wall_time_CI_high_8 }} |
        continue-on-error: false